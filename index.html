<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="style.css" rel="stylesheet" />

    <script defer src="script.js"></script>
    <title>Diet composer</title>
</head>

<body>
    <header>
        <h1 class="header">Diet composer</h1>
    </header>
    <main class="main">
        <section class="macro">
            <p class="macro__kcal">[] kcal</p>
            <div class="macro__nutrients">
                <p>[]g whey</p>
                <p>[]g fat</p>
                <p>[]g carbs</p>
            </div>
            <p class="macro__kcal">[] meals a day</p> <!-- class name to be changed -->
        </section>
        <section class="products">
            <div class="products__product">Product 1</div>
            <div class="products__product">Product 2</div>
            <div class="products__product">Product 3</div>
        </section>
    </main>
</body>

</html>
