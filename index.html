<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="style.css" rel="stylesheet" />

    <script defer src="script.js"></script>
    <script defer src="BMRscript.js"></script>
    <title>Diet composer</title>
</head>

<body>
    <header>
        <h1 class="header">Diet composer</h1>
    </header>
    <main class="main">
        <section class="macro">
            <p class="macro__kcal"><span class="js-kcal">[]</span> kcal</p>
            <div class="macro__nutrients">
                <p><span class="js-whey">[]</span>g whey</p>
                <p><span class="js-fat">[]</span>g fat</p>
                <p><span class="js-carbs">[]</span>g carbs</p>
            </div>
            <p class="macro__kcal"><span class="js-meals">[]</span> meals a day</p> <!-- class name to be changed -->
        </section>
        <section class="macroPerMeal">
            <h2 class="macroPerMeal__header">Macro per every meal:</h2>
            <p class="macroPerMeal__subheader">Planned:</p>
            <div class="macroPerMeal__nutrients">
                <p><span class="js-plannedPerMealKcal">[]</span> kcal</p>
                <p><span class="js-plannedPerMealWhey">[]</span>g whey</p>
                <p><span class="js-plannedPerMealFat">[]</span>g fat</p>
                <p><span class="js-plannedPerMealCarbs">[]</span>g carbs</p>
            </div>
            <p class="macroPerMeal__subheader">Actual:</p>
            <div class="macroPerMeal__nutrients">
                <p>[] kcal</p>
                <p>[]g whey</p>
                <p>[]g fat</p>
                <p>[]g carbs</p>
            </div>
        </section>
        <section class="products">
            <div class="product">
                <div class="product__weight"><span>[]</span>g</div>
                <div class="product__options">
                    <button class="product__sign">-</button>
                    <select>
                        <option value="product1">Product 1</option>
                        <option value="product2">Product 2</option>
                        <option value="product3">Product 3</option>
                        <option value="product4">Product 4</option>
                        <option value="product5">Product 5</option>
                    </select>
                    <button class="product__sign">+</button>
                </div>
                <div class="product__macros">
                    <div><span>[]</span>kcal</div>
                    <div><span>[]</span>kcal</div>
                    <div><span>[]</span>kcal</div>
                    <div><span>[]</span>kcal</div>
                </div>
            </div>
            <div class="product">
                <button class="product__sign">-</button>
                <select>
                    <option value="product1">Product 1</option>
                    <option value="product2">Product 2</option>
                    <option value="product3">Product 3</option>
                    <option value="product4">Product 4</option>
                    <option value="product5">Product 5</option>
                </select>
                <button class="product__sign">+</button>
            </div>
            <div class="product">
                <button class="product__sign">-</button>
                <select>
                    <option value="product1">Product 1</option>
                    <option value="product2">Product 2</option>
                    <option value="product3">Product 3</option>
                    <option value="product4">Product 4</option>
                    <option value="product5">Product 5</option>
                </select>
                <button class="product__sign">+</button>
            </div>
        </section>

    </main>
</body>

</html>
